<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Integral - Inicio</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --oscuro: #2c3e50;
            --cet: #2c3e50;
            --cd: #006064;
            --rehab: #8e44ad;
            --fac: #27ae60;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 { color: var(--oscuro); margin-bottom: 30px; font-size: 28px; }
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 20px;
        }
        .btn-menu {
            height: 150px;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-menu:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .cet { background: var(--cet); }
        .cd { background: var(--cd); }
        .rehab { background: var(--rehab); }
        .fac { background: var(--fac); }
        
        .icon { font-size: 40px; }
        .footer { margin-top: 40px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 CLÍNICA INTEGRAL</h1>
    
    <div class="grid-menu">
        <button class="btn-menu cet" onclick="location.href='cet.html'">
            <span class="icon">🏠</span>
            C.E.T.
        </button>
        
        <button class="btn-menu cd" onclick="location.href='cd.html'">
            <span class="icon">🏫</span>
            CENTRO DE DÍA
        </button>
        
        <button class="btn-menu rehab" onclick="location.href='rehab.html'">
            <span class="icon">♿</span>
            REHABILITACIÓN
        </button>
        
        <button class="btn-menu fac" onclick="location.href='facturacion.html'">
            <span class="icon">📂</span>
            FACTURACIÓN
        </button>
    </div>

    <div class="footer">
        Sistema de Gestión Integral - 2026
    </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ Sistema Activo'))
        .catch(err => console.log('❌ Error al activar sistema', err));
    });
  }
</script>
</body>
</html>
